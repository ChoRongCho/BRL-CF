actions:
  - name: move
    type: task
    parameters: [from, to]
    cost: 1.0
    preconditions:
      - robot_at_{from}
    add_effects:
      - robot_at_{to}
    del_effects:
      - robot_at_{from}

  - name: inspect
    type: observe
    parameters: [target]
    cost: 0.5
    preconditions: []
    add_effects: []
    del_effects: []

  - name: harvest
    type: task
    parameters: [target]
    cost: 2.0
    preconditions:
      - robot_at_{target}
    add_effects:
      - harvested_{target}
    del_effects:
      - ripe_{target}