actions:
  - name: detect_waste
    type: observe
    parameters: [R]
    cost: 0.5
    preconditions:
      - robot(R)
      - handempty(R)
    add_effects:
      - detected(W)
    del_effects: []
    observation:
      - detected(W)
      - plastic(W)
      - can(W)
      - paper(W)
      - general(W)


  - name: pick
    type: task
    parameters: [R, W]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
      - detected(W)
      - handempty(R)
    add_effects:
      - holding(R, W)
    del_effects:
      - handempty(R)
    observation:
      - holding(R, W)
      - handempty(R)


  - name: place_gw_bin
    type: task
    parameters: [R, W, B]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
      - holding(R, W)
      - general_bin(B)
      - detected(W)

    add_effects:
      - in_bin(W, B)
      - handempty(R)

    del_effects:
      - holding(R, W)
      - detected(W)

    observation:
      - in_bin(W, B)
      - handempty(R)
      - holding(R, W)
      - detected(W)


  - name: place_paper_bin
    type: task
    parameters: [R, W, B]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
      - holding(R, W)
      - paper_bin(B)
      - detected(W)
      
    add_effects:
      - in_bin(W, B)
      - handempty(R)

    del_effects:
      - holding(R, W)      
      - detected(W)

    observation:
      - in_bin(W, B)
      - handempty(R)
      - holding(R, W)
      - detected(W)




  - name: place_can_bin
    type: task
    parameters: [R, W, B]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
      - holding(R, W)
      - can_bin(B)
      - detected(W)

    add_effects:
      - in_bin(W, B)
      - handempty(R)

    del_effects:
      - holding(R, W)
      - detected(W)

    observation:
      - in_bin(W, B)
      - handempty(R)
      - detected(W)
      - holding(R, W)



  - name: place_plastic_bin
    type: task
    parameters: [R, W, B]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
      - holding(R, W)
      - plastic_bin(B)
      - detected(W)

    add_effects:
      - in_bin(W, B)
      - handempty(R)

    del_effects:
      - holding(R, W)
      - detected(W)

    observation:
      - in_bin(W, B)
      - handempty(R)
      - detected(W)
      - holding(R, W)

