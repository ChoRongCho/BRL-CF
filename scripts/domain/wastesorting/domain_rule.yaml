domain: WasteSorting

meta_data:
  description: "Simplified manipulator waste sorting domain"
  semantics: "ASP-style world generation under partial observability"
  purpose: "belief state initialization / possible world enumeration"
  assumptions:
    - "Each waste item is classified as exactly one of plastic, can, paper, or general after detection"
    - "Bin types are known at planning time"
    - "A waste item can be detected, picked, and placed into the matching bin"
    - "The robot can hold at most one waste item"

predicates:
  # objects
  - predicate: robot(R)
    arity: [R]
    meaning: "R is a manipulator robot"

  - predicate: waste(W)
    arity: [W]
    meaning: "W is a waste item"

  # bin properties
  - predicate: plastic_bin(B)
    arity: [B]
    meaning: "B accepts plastic waste"

  - predicate: can_bin(B)
    arity: [B]
    meaning: "B accepts can waste"

  - predicate: paper_bin(B)
    arity: [B]
    meaning: "B accepts paper waste"

  - predicate: general_bin(B)
    arity: [B]
    meaning: "B accepts general waste"

  # waste observation and properties
  - predicate: detected(W)
    arity: [W]
    meaning: "W has been detected"

  - predicate: plastic(W)
    arity: [W]
    meaning: "W is plastic waste"

  - predicate: can(W)
    arity: [W]
    meaning: "W is can waste"

  - predicate: paper(W)
    arity: [W]
    meaning: "W is paper waste"

  - predicate: general(W)
    arity: [W]
    meaning: "W is general waste"

  - predicate: holding(R,W)
    arity: [R,W]
    meaning: "Robot R holds waste item W"

  - predicate: handempty(R)
    arity: [R]
    meaning: "Robot R is not holding any waste"

  - predicate: in_bin(W,B)
    arity: [W,B]
    meaning: "Waste item W has been placed into bin B"



constraint:
  - body:
      - "holding(R,W)"
      - "handempty(R)"
    meaning: "Robot cannot hold an item while its hand is empty"

  - body:
      - "holding(R,W1)"
      - "holding(R,W2)"
      - "W1 != W2"
    meaning: "Robot cannot hold two waste items at once"

  - body:
      - "holding(R,W)"
      - "in_bin(W,B)"
    meaning: "Waste item cannot be held and already be in a bin"

  - body:
      - "detected(W)"
      - "not 1 { plastic(W); can(W); paper(W); general(W) } 1"
    meaning: "A detected waste item must have exactly one category"

  - body:
      - "in_bin(W,B)"
      - "plastic(W)"
      - "not plastic_bin(B)"
    meaning: "Plastic waste must be placed in a plastic bin"

  - body:
      - "in_bin(W,B)"
      - "can(W)"
      - "not can_bin(B)"
    meaning: "Can waste must be placed in a can bin"

  - body:
      - "in_bin(W,B)"
      - "paper(W)"
      - "not paper_bin(B)"
    meaning: "Paper waste must be placed in a paper bin"

  - body:
      - "in_bin(W,B)"
      - "general(W)"
      - "not general_bin(B)"
    meaning: "General waste must be placed in a general waste bin"

show:
  - "#show robot/1"
  - "#show waste/1"
  - "#show plastic_bin/1"
  - "#show can_bin/1"
  - "#show paper_bin/1"
  - "#show general_bin/1"
  - "#show detected/1"
  - "#show plastic/1"
  - "#show can/1"
  - "#show paper/1"
  - "#show general/1"
  - "#show holding/2"
  - "#show handempty/1"
  - "#show in_bin/2"
