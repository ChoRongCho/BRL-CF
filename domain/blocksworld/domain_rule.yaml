domain: Blocksworld

meta_data:
  description: "Blocksworld domain"
  semantics: "ASP-style world representation"
  purpose: "world-state representation"

predicates:
  - predicate: block(B)
    arity: [B]
    meaning: "B is a block"

  - predicate: support(S)
    arity: [S]
    meaning: "S is a legal support; either table or a block"

  - predicate: visible(B)
    arity: [B]
    meaning: "B is directly observed"

  - predicate: on(B, S)
    arity: [B, S]
    meaning: "World-state fluent: block B is on support S"

  - predicate: clear(X)
    arity: [X]
    meaning: "Nothing is on X"

  - predicate: above(B1, B2)
    arity: [B1, B2]
    meaning: "Transitive above relation"

  - predicate: block_count(N)
    arity: [N]
    meaning: "Total number of blocks"


rule:
  - head: "support(B)"
    body:
      - "block(B)"

  - head: "above(B1, B2)"
    body:
      - "on(B1, B2)"

  - head: "above(B1, B3)"
    body:
      - "on(B1, B2)"
      - "above(B2, B3)"

  - head: "clear(S)"
    body:
      - "support(S)"
      - "visible(S)"
      - "not on(_, S)"

  - head: "block_count(N)"
    body:
      - "N = #count { B : block(B) }"


choice_rules:
  - elements:
      - atom: "on(B, S)"
        over:
          - "support(S)"
    given:
      - "block(B)"
    cardinality: "1..1"



constraint:
  - body:
      - "on(B, B)"
    meaning: "No self-support"

  - body:
      - "on(B1, S)"
      - "on(B2, S)"
      - "block(S)"
      - "B1 != B2"
    meaning: "At most one block can be on a block"

  - body:
      - "above(B, B)"
    meaning: "No cycles in the support graph"



show:
  - "#show block/1"
  - "#show support/1"
  - "#show visible/1"
  - "#show on/2"
  - "#show clear/1"
  - "#show above/2"
  - "#show block_count/1"