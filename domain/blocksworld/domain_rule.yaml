domain: Blocksworld

meta_data:
  description: "Generate all possible worlds consistent with partial observations in Blocksworld"
  semantics: "ASP-style world generation under partial observability"
  purpose: "belief state initialization / possible world enumeration"
  assumptions:
    - "Every block is on exactly one support"
    - "A support is either table or another block"
    - "A block cannot support itself"
    - "Two different blocks cannot be on the same block simultaneously"
    - "Observed relations are hard evidence"
    - "Unobserved blocks may be assigned anywhere consistent with constraints"

predicates:
  - predicate: block(B)
    arity: [B]
    meaning: "B is a block"

  - predicate: support(S)
    arity: [S]
    meaning: "S is a legal support; either table or a block"

  - predicate: hidden(B)
    arity: [B]
    meaning: "B is not directly observed"

  - predicate: visible(B)
    arity: [B]
    meaning: "B is directly observed"

  - predicate: observed_on(B, S)
    arity: [B, S]
    meaning: "Observed fact that block B is on support S"

  - predicate: on(B, S)
    arity: [B, S]
    meaning: "World-state fluent: block B is on support S"

  - predicate: clear(X)
    arity: [X]
    meaning: "Nothing is on X"

  - predicate: above(B1, B2)
    arity: [B1, B2]
    meaning: "Transitive above relation"

  - predicate: possible_support(B, S)
    arity: [B, S]
    meaning: "S is a candidate support for hidden block B"

  - predicate: block_count(N)
    arity: [N]
    meaning: "Total number of blocks"

  - predicate: visible_count(N)
    arity: [N]
    meaning: "Number of observed blocks"

  - predicate: hidden_count(N)
    arity: [N]
    meaning: "Number of hidden blocks"


choice_rules:
  - choose: "on(B, S)"
    over:
      - "possible_support(B, S)"
    given:
      - "hidden(B)"
    cardinality: "1..1"

constraint:
  - body:
      - "on(B, B)"
    meaning: "No self-support"

  - body:
      - "on(B1, S)"
      - "on(B2, S)"
      - "block(S)"
      - "B1 != B2"
    meaning: "At most one block can be on a block"

  - body:
      - "above(B, B)"
    meaning: "No cycles in the support graph"

  - body:
      - "observed_on(B, S1)"
      - "on(B, S2)"
      - "S1 != S2"
    meaning: "Generated world must respect observations"

  - body:
      - "visible(B)"
      - "not 1 { on(B, S) : support(S) } 1"
    meaning: "Each visible block also has exactly one support"

  - body:
      - "hidden(B)"
      - "not 1 { on(B, S) : support(S) } 1"
    meaning: "Each hidden block has exactly one support"

  - body:
      - "on(B1, B2)"
      - "visible(B2)"
      - "clear(B2)"
      - "observed_on(B2, S)"
    meaning: "Optional visibility-consistency hook; remove if occlusion is allowed"

rule:
  - head: "world_consistent"
    body:
      - "not inconsistent"

  - head: "inconsistent"
    body:
      - "on(B, B)"

  - head: "inconsistent"
    body:
      - "above(B, B)"

  - head: "inconsistent"
    body:
      - "observed_on(B, S1)"
      - "on(B, S2)"
      - "S1 != S2"

show:
  - "#show block/1"
  - "#show support/1"
  - "#show hidden/1"
  - "#show visible/1"
  - "#show observed_on/2"
  - "#show on/2"
  - "#show clear/1"
  - "#show above/2"
  - "#show possible_support/2"
  - "#show block_count/1"
  - "#show visible_count/1"
  - "#show hidden_count/1"