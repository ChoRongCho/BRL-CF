actions:
  - name: navigate
    type: move
    parameters: [R, L1, L2]
    cost: 1.0
    preconditions:
      - robot(R)
      - location(L1)
      - location(L2)
      - located(R, L1)
      - navprepared(R)
    add_effects:
      - located(R, L2)
    del_effects:
      - located(R, L1)
      - navprepared(R)
    observation:
      - located(R, L1)
      - located(R, L2)
      - located(R, L3)


  - name: prepare_nav
    type: task
    parameters: [R]
    cost: 4.0
    preconditions:
      - robot(R)
      - handempty(R)
    add_effects:
      - navprepared(R)
    del_effects: []
    observation:
      - navprepared(R)


  - name: detect
    type: observe
    parameters: [R, S]
    cost: 0.5
    preconditions:
      - handempty(R)
      - robot(R)
      - stem(S)
      - located(R, S)
    add_effects:
      - observed(T)
      - at(T, S)
      - ripe(T)
    del_effects: []
    observation:
      - observed(T)
      - at(T, S)
      - ripe(T)
      - unripe(T)
      # - rotten(T)


  - name: pick
    type: task
    parameters: [R, T, S]
    cost: 1.0
    preconditions:
      - robot(R)
      - tomato(T)
      - observed(T)
      - stem(S)
      - located(R, S)
      - at(T, S)
      - handempty(R)
    add_effects:
      - holding(R, T)
      - holded(T, R)
    del_effects:
      - at(T, S)
      - handempty(R)
    observation:
      - at(T, S)
      - holding(R, T)
      - holded(T, R)


  - name: scan
    type: observe
    parameters: [R, T]
    cost: 0.5
    preconditions:
      - robot(R)
      - tomato(T)
      - observed(T)
      - holding(R, T)
    add_effects:
      - ripe(T)
    del_effects: []
    observation:
      - ripe(T)
      - unripe(T)
      - rotten(T)


  - name: place
    type: task
    parameters: [R, T]
    cost: 1.0
    preconditions:
      - robot(R)
      - tomato(T)
      - observed(T)
      - holding(R, T)
      - holded(T, R)
    add_effects:
      - loaded(T, R)
      - handempty(R)
    del_effects:
      - holding(R, T)
      - holded(T, R)
    observation:
      - loaded(T, R)
      - handempty(R)
      - holding(R, T)


  - name: discard
    type: task
    parameters: [R, T]
    cost: 1.0
    preconditions:
      - robot(R)
      - tomato(T)
      - observed(T)
      - holding(R, T)
      - holded(T, R)
    add_effects:
      - discarded(T)
      - handempty(R)
    del_effects:
      - holding(R, T)
      - holded(T, R)
    observation:
      - discarded(T)
      - handempty(R)
      - holding(R, T)

