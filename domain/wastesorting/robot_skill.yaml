      - direct_placeable(W)
      - glass(W)
      - glass_bin(B)
    add_effects:
      - in_bin(W, B)
      - handempty(R)
    del_effects:
      - holding(R, W)
    observation:
      - in_bin(W, B)
      - handempty(R)

  - name: place_direct_general_in_bin
    type: task
    parameters: [R, W, B]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
      - bin(B)
      - holding(R, W)
      - direct_placeable(W)
      - general(W)
      - general_bin(B)
    add_effects:
      - in_bin(W, B)
      - handempty(R)
    del_effects:
      - holding(R, W)
    observation:
      - in_bin(W, B)
      - handempty(R)

  - name: place_direct_hazardous_in_bin
    type: task
    parameters: [R, W, B]
    cost: 1.0
    preconditions:
      - robot(R)
      - waste(W)
